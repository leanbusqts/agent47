rules:
  - id: "SEC-js-ts-001"
    severity: "critical"
    applies_to: "frontend"
    rule: "Do not inject untrusted content into the DOM without safe escaping or trusted sanitization."

  - id: "SEC-js-ts-002"
    severity: "critical"
    applies_to: "frontend"
    rule: "Do not store sensitive tokens in insecure browser-accessible storage unless the architecture explicitly requires and protects it."

  - id: "SEC-js-ts-003"
    severity: "high"
    applies_to: "frontend"
    rule: "Keep client input validation aligned with server validation; client checks improve UX but do not replace server enforcement."
