rules:
  - id: "SEC-java-kotlin-001"
    severity: "critical"
    applies_to: "backend|mobile"
    rule: "Do not deserialize untrusted data with unsafe object deserialization mechanisms."

  - id: "SEC-java-kotlin-002"
    severity: "critical"
    applies_to: "backend|mobile"
    rule: "Use parameterized queries and safe persistence APIs; never concatenate user input into queries."

  - id: "SEC-java-kotlin-003"
    severity: "high"
    applies_to: "backend|mobile"
    rule: "Use cryptographically secure randomness for tokens, secrets, and security-sensitive identifiers."
