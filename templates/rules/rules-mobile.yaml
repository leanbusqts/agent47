# Mobile rules extend AGENTS.md and may reference security IDs from rules/.

rules:
  - topic: "testing:structure"
    level: "high"
    rule: "Use clear behavior-driven test structure that makes scenario, action, and outcome obvious."

  - topic: "testing:naming"
    level: "medium"
    rule: "Name tests by behavior and expected outcome."

  - topic: "mobile:encapsulation"
    level: "high"
    rule: "Preserve intended encapsulation; do not widen visibility to bypass design constraints."

  - topic: "mobile:consistency"
    level: "medium"
    rule: "Follow existing patterns in the surrounding module and avoid introducing divergent patterns without justification."

  - topic: "mobile:async-safety"
    level: "high"
    rule: "Keep IO and compute off the UI thread, use safe async coordination, and avoid unsafe force unwraps or equivalent shortcuts."
    refs:
      - "SEC-global-003"
      - "SEC-java-kotlin-003"
      - "SEC-swift-002"

  - topic: "mobile:platform-security"
    level: "high"
    rule: "Apply the matching language security rules for the mobile stack: Java/Kotlin rules for Android, Swift rules for iOS, and C# rules for MAUI/Xamarin-style mobile apps."
    refs:
      - "SEC-java-kotlin-001"
      - "SEC-java-kotlin-002"
      - "SEC-java-kotlin-003"
      - "SEC-swift-001"
      - "SEC-swift-002"
      - "SEC-csharp-001"
      - "SEC-csharp-002"

  - topic: "mobile:dependencies"
    level: "high"
    rule: "Mobile dependency or config changes require approval and should reuse existing project libraries."

  - topic: "mobile:architecture-default"
    level: "high"
    rule: "Unless the user explicitly requests another architecture, implement mobile features with explicit UI, domain, and data layers."

  - topic: "mobile:architecture-patterns"
    level: "high"
    rule: "Use unidirectional data flow, a single source of truth per state owner, repositories as the boundary to data sources, and dependency injection. Keep platform details at the edges and business rules in the domain layer."

  - topic: "mobile:android-architecture"
    level: "high"
    rule: "On Android, use the recommended app architecture patterns: screen-level ViewModels in the UI layer, repositories in the data layer, use cases or interactors in the domain layer, and observable UI state exposed from the state holder."

  - topic: "mobile:ios-architecture"
    level: "high"
    rule: "On iOS, apply the same layered architecture using platform-native patterns: SwiftUI views in the UI layer, observable screen-level state holders or view models, repositories in the data layer, domain use cases or services in the domain layer, and a single source of truth for UI state."

  - topic: "mobile:layering"
    level: "high"
    rule: "Keep mobile modules clearly separated by feature and by layer. Domain is required in the recommended architecture, not optional."
